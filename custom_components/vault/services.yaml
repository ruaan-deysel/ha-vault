run_backup:
  name: Run Backup
  description: Trigger an immediate backup run for a Vault job.
  fields:
    job_id:
      name: Job ID
      description: The Vault backup job ID to run. Provide either job_id or job_name.
      required: false
      selector:
        number:
          min: 1
          mode: box
    job_name:
      name: Job Name
      description: The name of the Vault backup job to run. Provide either job_id or job_name.
      required: false
      selector:
        text:
    config_entry_id:
      name: Config Entry ID
      description: Optional target Vault config entry ID. Leave empty when only one Vault instance is configured; required when multiple instances are configured.
      required: false
      selector:
        text:

restore:
  name: Restore Backup
  description: Restore an item from a Vault backup restore point.
  fields:
    job_id:
      name: Job ID
      description: The Vault backup job ID that created the restore point.
      required: true
      selector:
        number:
          min: 1
          mode: box
    restore_point_id:
      name: Restore Point ID
      description: The ID of the restore point to restore from.
      required: true
      selector:
        number:
          min: 1
          mode: box
    item_name:
      name: Item Name
      description: Name of the item to restore (container name, VM name, or folder).
      required: true
      selector:
        text:
    item_type:
      name: Item Type
      description: Type of the item to restore.
      required: true
      selector:
        select:
          options:
            - container
            - vm
            - folder
    passphrase:
      name: Encryption Passphrase
      description: Required if the backup was created with age encryption.
      required: false
      selector:
        text:
    destination:
      name: Destination Override
      description: Optional override for restore destination path.
      required: false
      selector:
        text:
    config_entry_id:
      name: Config Entry ID
      description: Optional target Vault config entry ID. Leave empty when only one Vault instance is configured; required when multiple instances are configured.
      required: false
      selector:
        text:

test_storage:
  name: Test Storage Connection
  description: Test connectivity to a Vault storage destination.
  fields:
    storage_id:
      name: Storage Destination ID
      description: The ID of the storage destination to test.
      required: true
      selector:
        number:
          min: 1
          mode: box
    config_entry_id:
      name: Config Entry ID
      description: Optional target Vault config entry ID. Leave empty when only one Vault instance is configured; required when multiple instances are configured.
      required: false
      selector:
        text:
