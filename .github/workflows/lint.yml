name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.9.3"
          enable-cache: true
          cache-dependency-glob: "**/requirements*.txt"

      - name: Cache Home Assistant installation
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .local/ha-venv
          key: ha-venv-${{ runner.os }}-py313-lint-${{ hashFiles('requirements_dev.txt') }}
          restore-keys: |
            ha-venv-${{ runner.os }}-py313-lint-

      - name: Install lint dependencies
        run: |
          if [ ! -d .local/ha-venv ]; then
            uv venv .local/ha-venv
          fi
          source .local/ha-venv/bin/activate
          uv pip install --upgrade --requirement requirements_dev.txt
          uv pip install --upgrade ruff

      - name: Lint check
        run: script/lint-check
