name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - custom_components/vault/manifest.json

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish release from manifest version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract version from manifest
        id: version
        run: |
          VERSION="$(jq -r '.version' custom_components/vault/manifest.json)"

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Manifest version is missing."
            exit 1
          fi

          # Accept Home Assistant style numeric segments: YYYY.M.D or YYYY.MM.DD
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            echo "Manifest version '$VERSION' does not match expected format YYYY.MM.DD (or single-digit month/day)."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract latest changelog section
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          FOOTER="See [CHANGELOG.md](https://github.com/${REPOSITORY}/blob/${TAG}/CHANGELOG.md) for the full changelog."

          emit_notes() {
            echo "----- release notes -----"
            cat "$1"
            echo "-------------------------"
            {
              echo "notes<<NOTES_EOF"
              cat "$1"
              echo "NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          }

          fallback_notes() {
            {
              echo "Release ${TAG}"
              echo
              echo "---"
              echo
              echo "$FOOTER"
            } > /tmp/release_notes.md
            emit_notes /tmp/release_notes.md
          }

          if [[ ! -f CHANGELOG.md ]]; then
            echo "notes=Release ${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Normalize a dotted version by stripping leading zeros from each
          # segment, so the manifest version (2026.6.1) matches zero-padded
          # changelog headings ([2026.06.01]).
          norm() {
            awk -F. -v OFS=. '{ for (i = 1; i <= NF; i++) $i += 0; print }' <<< "$1"
          }

          target="$(norm "$VERSION")"

          # Locate the changelog section for this release: headings look like
          # "## [2026.06.01] - 2026-06-13". Prefer the section matching the
          # manifest version; fall back to the first versioned section.
          start="" end="" first_start="" first_end=""
          while IFS=: read -r lineno text; do
            if [[ -n "$start" && -z "$end" && "$lineno" -gt "$start" ]]; then
              end="$lineno"
            fi
            if [[ -n "$first_start" && -z "$first_end" && "$lineno" -gt "$first_start" ]]; then
              first_end="$lineno"
            fi
            ver="$(sed -n 's/^## \[\([0-9][0-9.]*\)\].*/\1/p' <<< "$text")"
            [[ -z "$ver" ]] && continue
            [[ -z "$first_start" ]] && first_start="$lineno"
            if [[ -z "$start" && "$(norm "$ver")" == "$target" ]]; then
              start="$lineno"
            fi
          done < <(grep -n '^## \[' CHANGELOG.md)

          if [[ -z "$start" ]]; then
            echo "No changelog section found for version ${VERSION}; falling back to the first versioned section."
            start="$first_start"
            end="$first_end"
          fi

          if [[ -z "$start" ]]; then
            echo "No versioned changelog section found at all."
            fallback_notes
            exit 0
          fi

          if [[ -n "$end" ]]; then
            sed -n "$((start + 1)),$((end - 1))p" CHANGELOG.md > /tmp/section.md
          else
            sed -n "$((start + 1)),\$p" CHANGELOG.md > /tmp/section.md
          fi

          # Trim leading and trailing blank lines
          awk 'NF { seen = 1 } seen' /tmp/section.md | tac | awk 'NF { seen = 1 } seen' | tac > /tmp/release_notes.md

          if [[ ! -s /tmp/release_notes.md ]]; then
            echo "Matched changelog section is empty."
            fallback_notes
            exit 0
          fi

          {
            echo
            echo "---"
            echo
            echo "$FOOTER"
          } >> /tmp/release_notes.md

          emit_notes /tmp/release_notes.md

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false

      - name: Skip when release already exists
        if: steps.tag.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release creation."
