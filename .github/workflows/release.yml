name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - custom_components/vault/manifest.json

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish release from manifest version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from manifest
        id: version
        run: |
          VERSION="$(jq -r '.version' custom_components/vault/manifest.json)"

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Manifest version is missing."
            exit 1
          fi

          # Accept Home Assistant style numeric segments: YYYY.M.D or YYYY.MM.DD
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            echo "Manifest version '$VERSION' does not match expected format YYYY.MM.DD (or single-digit month/day)."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract latest changelog section
        id: changelog
        run: |
          if [[ ! -f CHANGELOG.md ]]; then
            echo "notes=Release ${{ steps.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk '
            /^## [0-9]{4}\.[0-9]{2}\.[0-9]{2}$/ {
              if (found) {
                exit
              }
              found=1
            }
            found {
              print
            }
          ' CHANGELOG.md > /tmp/release_notes.txt

          if [[ ! -s /tmp/release_notes.txt ]]; then
            {
              echo "notes<<EOF"
              echo "Release ${{ steps.version.outputs.tag }}"
              echo
              echo "See CHANGELOG.md for details."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "notes<<EOF"
            cat /tmp/release_notes.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false

      - name: Skip when release already exists
        if: steps.tag.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release creation."
